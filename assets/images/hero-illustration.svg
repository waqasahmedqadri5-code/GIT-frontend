<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="100" y="60" width="400" height="300" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background blobs -->
  <ellipse cx="500" cy="100" rx="200" ry="200" fill="#10b981" opacity="0.07" filter="url(#blur1)"/>
  <ellipse cx="100" cy="380" rx="160" ry="160" fill="#0891b2" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="300" cy="240" rx="120" ry="120" fill="#7c3aed" opacity="0.04" filter="url(#blur1)"/>

  <!-- Main dashboard card -->
  <rect x="100" y="60" width="400" height="300" rx="24"
    fill="url(#cardGrad)" filter="url(#shadow1)"/>

  <!-- Card shine -->
  <rect x="100" y="60" width="400" height="130" rx="24"
    fill="white" opacity="0.08"/>

  <!-- Card top bar dots -->
  <circle cx="130" cy="92" r="6" fill="#ef4444" opacity="0.9"/>
  <circle cx="150" cy="92" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="170" cy="92" r="6" fill="#10b981" opacity="0.9"/>

  <!-- GIT Logo in card -->
  <text x="300" y="200" font-family="Georgia, serif" font-size="64" font-weight="700"
    fill="white" text-anchor="middle" opacity="0.15" letter-spacing="-2">GIT</text>

  <!-- Code lines illustration -->
  <g opacity="0.6">
    <rect x="140" y="120" width="120" height="8" rx="4" fill="white" opacity="0.3"/>
    <rect x="140" y="136" width="80"  height="8" rx="4" fill="#34d399" opacity="0.7"/>
    <rect x="140" y="152" width="100" height="8" rx="4" fill="white" opacity="0.2"/>
    <rect x="160" y="168" width="60"  height="8" rx="4" fill="#38bdf8" opacity="0.6"/>
    <rect x="160" y="184" width="90"  height="8" rx="4" fill="white" opacity="0.2"/>
    <rect x="160" y="200" width="40"  height="8" rx="4" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- Progress bars -->
  <g transform="translate(300, 120)">
    <rect x="0" y="0"  width="160" height="12" rx="6" fill="white" opacity="0.1"/>
    <rect x="0" y="0"  width="120" height="12" rx="6" fill="#34d399" opacity="0.8"/>

    <rect x="0" y="20" width="160" height="12" rx="6" fill="white" opacity="0.1"/>
    <rect x="0" y="20" width="90"  height="12" rx="6" fill="#38bdf8" opacity="0.8"/>

    <rect x="0" y="40" width="160" height="12" rx="6" fill="white" opacity="0.1"/>
    <rect x="0" y="40" width="140" height="12" rx="6" fill="#a78bfa" opacity="0.8"/>

    <rect x="0" y="60" width="160" height="12" rx="6" fill="white" opacity="0.1"/>
    <rect x="0" y="60" width="60"  height="12" rx="6" fill="#fb923c" opacity="0.8"/>
  </g>

  <!-- Chart bars at bottom of card -->
  <g transform="translate(145, 240)">
    <rect x="0"   y="40" width="28" height="40" rx="4" fill="#34d399" opacity="0.8"/>
    <rect x="36"  y="20" width="28" height="60" rx="4" fill="#38bdf8" opacity="0.8"/>
    <rect x="72"  y="30" width="28" height="50" rx="4" fill="#34d399" opacity="0.6"/>
    <rect x="108" y="10" width="28" height="70" rx="4" fill="#a78bfa" opacity="0.8"/>
    <rect x="144" y="25" width="28" height="55" rx="4" fill="#34d399" opacity="0.7"/>
    <rect x="180" y="15" width="28" height="65" rx="4" fill="#fb923c" opacity="0.7"/>
  </g>

  <!-- Floating UI cards -->
  <!-- Top right card: Course count -->
  <rect x="460" y="40" width="130" height="72" rx="16"
    fill="white" filter="url(#shadow2)" opacity="0.97"/>
  <rect x="476" y="56" width="36" height="36" rx="10" fill="#dcfce7"/>
  <text x="488" y="79" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#059669">📚</text>
  <text x="522" y="72" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#0f172a">9 Courses</text>
  <text x="522" y="88" font-family="Arial,sans-serif" font-size="11" fill="#64748b">Available Now</text>

  <!-- Bottom left: Students -->
  <rect x="10" y="340" width="140" height="72" rx="16"
    fill="white" filter="url(#shadow2)" opacity="0.97"/>
  <rect x="26" y="356" width="36" height="36" rx="10" fill="#dbeafe"/>
  <text x="34" y="379" font-family="Georgia,serif" font-size="18">🎓</text>
  <text x="72" y="372" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#0f172a">2,400+</text>
  <text x="72" y="388" font-family="Arial,sans-serif" font-size="11" fill="#64748b">Graduates</text>

  <!-- Bottom right: Rating -->
  <rect x="450" y="360" width="140" height="72" rx="16"
    fill="white" filter="url(#shadow2)" opacity="0.97"/>
  <rect x="466" y="376" width="36" height="36" rx="10" fill="#fef9c3"/>
  <text x="474" y="399" font-family="Georgia,serif" font-size="18">⭐</text>
  <text x="512" y="392" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#0f172a">4.9 / 5.0</text>
  <text x="512" y="408" font-family="Arial,sans-serif" font-size="11" fill="#64748b">Student Rating</text>

  <!-- Connecting dots (network effect) -->
  <circle cx="300" cy="420" r="5" fill="#10b981" opacity="0.5"/>
  <circle cx="240" cy="440" r="3" fill="#10b981" opacity="0.35"/>
  <circle cx="360" cy="440" r="3" fill="#10b981" opacity="0.35"/>
  <circle cx="180" cy="450" r="2" fill="#10b981" opacity="0.25"/>
  <circle cx="420" cy="450" r="2" fill="#10b981" opacity="0.25"/>
  <line x1="300" y1="420" x2="240" y2="440" stroke="#10b981" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="420" x2="360" y2="440" stroke="#10b981" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="440" x2="180" y2="450" stroke="#10b981" stroke-width="1" opacity="0.2"/>
  <line x1="360" y1="440" x2="420" y2="450" stroke="#10b981" stroke-width="1" opacity="0.2"/>
</svg>