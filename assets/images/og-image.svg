<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#022c22"/>
      <stop offset="50%"  stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <ellipse cx="900" cy="200" rx="300" ry="300" fill="#10b981" opacity="0.12" filter="url(#glow)"/>
  <ellipse cx="200" cy="500" rx="200" ry="200" fill="#0891b2" opacity="0.08" filter="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="200" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="120" y="257" font-family="Georgia,serif" font-size="32" font-weight="700"
    fill="white" text-anchor="middle" letter-spacing="1">GIT</text>

  <!-- Institute name -->
  <text x="180" y="243" font-family="Georgia,serif" font-size="28" font-weight="700"
    fill="white" dominant-baseline="middle">Green Institute of Technology</text>

  <!-- Tagline underline -->
  <rect x="80" y="300" width="400" height="3" rx="1.5" fill="#34d399" opacity="0.6"/>

  <!-- Main headline -->
  <text x="80" y="380" font-family="Georgia,serif" font-size="56" font-weight="700"
    fill="white" letter-spacing="-2">Transform Your Future</text>
  <text x="80" y="450" font-family="Georgia,serif" font-size="56" font-weight="700"
    fill="url(#accent)" letter-spacing="-2">Through Technology</text>

  <!-- Sub text -->
  <text x="80" y="520" font-family="Arial,sans-serif" font-size="22" fill="white" opacity="0.7">
    Premium tech education • 9 courses • 2,400+ graduates • 97% placement
  </text>

  <!-- Right side stats -->
  <rect x="920" y="180" width="200" height="100" rx="16" fill="white" opacity="0.08"/>
  <text x="1020" y="228" font-family="Georgia,serif" font-size="40" font-weight="700" fill="white" text-anchor="middle">9+</text>
  <text x="1020" y="256" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.6" text-anchor="middle">Courses</text>

  <rect x="920" y="300" width="200" height="100" rx="16" fill="white" opacity="0.08"/>
  <text x="1020" y="348" font-family="Georgia,serif" font-size="40" font-weight="700" fill="white" text-anchor="middle">97%</text>
  <text x="1020" y="376" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.6" text-anchor="middle">Placement Rate</text>

  <rect x="920" y="420" width="200" height="100" rx="16" fill="white" opacity="0.08"/>
  <text x="1020" y="468" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#34d399" text-anchor="middle">4.9★</text>
  <text x="1020" y="496" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.6" text-anchor="middle">Student Rating</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#10b981" opacity="0.4"/>
  <text x="600" y="620" font-family="Arial,sans-serif" font-size="14" fill="white" opacity="0.7" text-anchor="middle">git.edu.pk</text>
</svg>